---
# =====================================================================
# 1. CÀI ĐẶT INGRESS NGINX CONTROLLER
# =====================================================================
- name: Deploy Ingress Nginx Controller (Baremetal)
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml
  register: ingress_result
  changed_when: "'created' in ingress_result.stdout or 'configured' in ingress_result.stdout"

- name: Ép cứng NodePort (32080 cho HTTP, 32443 cho HTTPS) cho Ingress Controller
  command: >
    kubectl patch svc ingress-nginx-controller -n ingress-nginx -p '{"spec": {"ports": [{"port": 80, "nodePort": 32080}, {"port": 443, "nodePort": 32443}]}}'

- name: Wait for Ingress Controller to be ready
  command: >
    kubectl wait --namespace ingress-nginx 
    --for=condition=ready pod 
    --selector=app.kubernetes.io/component=controller 
    --timeout=5m
  changed_when: false

# =====================================================================
# 2. CÀI ĐẶT & PATCH METRICS SERVER
# =====================================================================
- name: Deploy Metrics Server
  command: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  register: metrics_result
  changed_when: "'created' in metrics_result.stdout or 'configured' in metrics_result.stdout"

- name: Patch Metrics Server to allow insecure TLS (Bypass x509 error)
  command: >
    kubectl patch deployment metrics-server -n kube-system --type='json' 
    -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
  register: patch_result
  # Chỉ báo vàng (changed) nếu thực sự có thay đổi (chưa được patch)
  changed_when: "'patched' in patch_result.stdout"
  failed_when: false # Bỏ qua lỗi nếu đã patch rồi

# =====================================================================
# 3. CÀI ĐẶT HELM & KUBE-PROMETHEUS-STACK
# =====================================================================
- name: Install Helm binary (if not exists)
  shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Prometheus Helm repository
  command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  changed_when: false

- name: Update Helm repositories
  command: helm repo update
  changed_when: false

- name: Check monitoring release exists
  command: helm status monitoring
  register: monitoring_release
  failed_when: false
  changed_when: false

- name: Install kube-prometheus-stack
  command: helm install monitoring prometheus-community/kube-prometheus-stack --timeout 15m
  when: monitoring_release.rc != 0


# =====================================================================
# 4. TRIỂN KHAI INGRESS CHO MONITORING (DÙNG TEMPLATE)
# =====================================================================
- name: Phân giải tên miền AWS ELB sang danh sách IP Public
  shell: |
    dig +short {{ hostvars['loadbalancer_api']['ansible_host'] }} | grep -E '^[0-9.]+$'
  register: elb_dns_lookup
  changed_when: false
  delegate_to: localhost # Chạy trực tiếp tại máy Ansible Control Node của bạn

- name: Thiết lập danh sách IP của Load Balancer làm biến toàn cục
  set_fact:
    lb_ips: "{{ elb_dns_lookup.stdout_lines }}"

- name: Generate Monitoring Ingress manifest from template
  template:
    src: monitoring-ingress-k8s.yaml.j2
    dest: /tmp/monitoring-ingress-k8s.yaml
    mode: '0644'


# --- TASK BỔ SUNG ĐỂ SỬA LỖI NGHẼN WEBHOOK ---
- name: Bypass Ingress Nginx Validating Webhook (Chống kẹt deadline)
  command: kubectl delete validatingwebhookconfigurations ingress-nginx-admission --ignore-not-found
  failed_when: false # Cực kỳ quan trọng: Nếu đã xóa rồi hoặc không tìm thấy, Ansible vẫn bỏ qua và báo xanh
  tags: bypass_webhook

- name: Apply Monitoring Ingress
  command: kubectl apply -f /tmp/monitoring-ingress-k8s.yaml
  register: monitoring_ingress_result
  changed_when: "'created' in monitoring_ingress_result.stdout or 'configured' in monitoring_ingress_result.stdout"