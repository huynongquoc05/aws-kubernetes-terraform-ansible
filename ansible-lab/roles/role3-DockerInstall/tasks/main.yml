---
# tasks file for roles/role3-DockerInstall

- name: Install apt repository prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg
    mode: '0644'

- name: Dearmor Docker GPG key
  shell: gpg --dearmor < /tmp/docker.gpg > /etc/apt/keyrings/docker.gpg
  args:
    # Đồng bộ tên file thành docker.gpg để khớp với cài thủ công
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker APT repository specification
  apt_repository:
    # Đã sửa biến facts thành ansible_facts[...] để xóa sạch DEPRECATION WARNING
    repo: "deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present

- name: Install Docker Engine and Plugins
  apt:
    name: "{{ item }}"
    state: latest
    update_cache: yes
    dpkg_options: 'force-confold,force-confdef'
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Add current SSH user to docker group
  user:
    name: "{{ ansible_facts['env']['USER'] }}" # Đã sửa thành cách gọi facts chuẩn
    groups: docker
    append: yes

- name: Ensure Docker service is running and enabled
  service:
    name: docker
    state: started
    enabled: yes
    daemon_reload: yes