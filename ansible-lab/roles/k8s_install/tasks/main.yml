---
# SPDX-License-Identifier: MIT-0

# ---------------------------------------------------------
# 1. TẮT SWAP
# ---------------------------------------------------------
- name: Disable swap immediately
  command: swapoff -a
  tags: swap

- name: Disable swap permanently in fstab
  shell: sed -i '/swap/d' /etc/fstab
  tags: swap

# ---------------------------------------------------------
# 2. CẤU HÌNH KERNEL MODULES & NETWORK
# ---------------------------------------------------------
- name: Configure kernel modules persistence
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      br_netfilter
      overlay
    mode: '0644'

- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present

- name: Configure sysctl network bridging parameters
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
    mode: '0644'

- name: Apply sysctl parameters
  command: sysctl --system

# ---------------------------------------------------------
# 3. CÀI ĐẶT & CẤU HÌNH CONTAINERD
# ---------------------------------------------------------
- name: Install containerd package
  apt:
    name: containerd
    state: present
    update_cache: yes

- name: Create containerd directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Set SystemdCgroup to true in containerd config
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

# ---------------------------------------------------------
# 4. THÊM KHO LƯU TRỮ KUBERNETES DEB REPO
# ---------------------------------------------------------
- name: Install APT repository prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
    state: present

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes signing key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    dest: /tmp/k8s-release.key
    mode: '0644'

- name: Dearmor Kubernetes signing key safely
  shell: gpg --dearmor < /tmp/k8s-release.key > /etc/apt/keyrings/kubernetes-archive-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-archive-keyring.gpg

- name: Add Kubernetes apt repository specification
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    filename: kubernetes
    state: present

# ---------------------------------------------------------
# 5. CÀI ĐẶT BỘ CÔNG CỤ K8S VÀ KHÓA PHIÊN BẢN
# ---------------------------------------------------------
- name: Install kubelet, kubeadm, and kubectl
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: yes

# Đã sửa lỗi dấu cách trước dấu hai chấm và thêm cơ chế kiểm tra chống lặp màu vàng
- name: Hold Kubernetes packages version
  shell: apt-mark hold kubelet kubeadm kubectl
  register: apt_mark_result
  changed_when: "'already set on hold' not in apt_mark_result.stdout"

- name: Ensure kubelet service is enabled and running
  systemd:
    name: kubelet
    enabled: yes
    state: started